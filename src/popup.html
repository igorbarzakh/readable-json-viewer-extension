<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;

        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #1a1a1a;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 200px;
        background: #fff;
        padding: 14px 16px;
      }
      .dot {
        position: absolute;
        left: 0;
        top: 0;
      }
      .label {
        position: relative;
        padding-left: 20px;
        line-height: 1.4;
      }
      .sub {
        margin-top: 2px;
        font-size: 11px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="status">
      <div class="label">
        <div class="dot" id="dot"></div>
        <div id="title"></div>
        <div class="sub" id="sub"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
