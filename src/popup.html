<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a1a;
        width: 280px;
        box-sizing: border-box;
      }
      .header {
        margin-bottom: 14px;
      }
      .header-name {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: none;
        color: #ff217a;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 2px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #b4b5b5;
      }
      .dot--active {
        background: #e91e8c;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        color: #343434;
      }
      .sub {
        font-size: 12px;
        color: #343434;
        opacity: 0.45;
        margin-top: 2px;
        padding-left: 18px;
      }
      .copy-btn {
        display: none;
        width: 100%;
        margin-top: 14px;
        padding: 8px;
        background: #e91e8c;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        box-sizing: border-box;
        transition: background-color 0.2s ease-in-out;
      }
      .copy-btn:hover {
        background: #d01880;
      }
      .copy-btn--visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-name">Readable JSON Viewer</div>
    </div>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <div class="title" id="title"></div>
    </div>
    <div class="sub" id="sub"></div>
    <button class="copy-btn" id="copy-btn" type="button">Download</button>

    <script src="popup.js"></script>
  </body>
</html>
