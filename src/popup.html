<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a1a;
        width: 260px;
      }
      .header {
        padding: 16px 18px 14px;
        border-bottom: 1px solid #f0f0f0;
      }
      .header-name {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #FF217A;
      }
      .status {
        padding: 16px 18px 18px;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #b4b5b5;
      }
      .dot--active {
        background: #6ddb3f;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        color: #343434;
      }
      .sub {
        font-size: 12px;
        color: #9ca3af;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-name">Readable JSON Viewer</div>
    </div>
    <div class="status">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <div class="title" id="title"></div>
      </div>
      <div class="sub" id="sub"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
